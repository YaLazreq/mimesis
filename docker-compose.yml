services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file: ./backend/.env
    environment:
      - STATE_API_URL=http://localhost:8080
      - ALLOWED_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
        NEXT_PUBLIC_WS_URL: "ws://localhost:8000/ws"
    ports:
      - "3000:8080"
    depends_on:
      - backend
